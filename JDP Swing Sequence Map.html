<!DOCTYPE html>
<html lang="en">

<title>JDP Swing Sequence Map</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green-dark:#1a5c2a;--green-mid:#2d8a4a;--green-light:#4caf70;
  --green-pale:#e8f5e9;--green-bg:#f0f7f0;--green-border:#c8e6c9;
  --text-dark:#1a2e1a;--text-mid:#2d4a2d;--text-light:#5a7a5a;--white:#fff;
  --header-h:56px;--stage-h:52px;--radius:10px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:15px;background:var(--green-bg);color:var(--text-dark);-webkit-font-smoothing:antialiased}
#header{position:fixed;top:0;left:0;right:0;height:var(--header-h);background:var(--green-dark);display:flex;align-items:center;padding:0 8px;gap:4px;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,.3)}
#back-btn{display:none;background:none;border:none;color:#fff;width:44px;height:44px;align-items:center;justify-content:center;cursor:pointer;border-radius:8px;font-size:22px}
#back-btn.visible{display:flex}
#header-title{flex:1;color:#fff;font-size:16px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px}
#stage-nav{position:fixed;top:var(--header-h);left:0;right:0;height:var(--stage-h);background:var(--green-dark);display:flex;overflow-x:auto;z-index:199;box-shadow:0 3px 8px rgba(0,0,0,.2)}
#stage-nav.hidden{display:none}
.stage-tab{flex-shrink:0;padding:0 16px;height:100%;display:flex;align-items:center;background:none;border:none;color:rgba(255,255,255,.6);font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;border-bottom:3px solid transparent}
.stage-tab.active{color:#fff;border-bottom-color:var(--green-light)}
#main{padding-top:calc(var(--header-h) + var(--stage-h));min-height:100vh}

.view{display:none}
.view.active{display:block}
.page-banner{background:var(--green-dark);color:#fff;padding:14px 16px 16px}
.page-banner h2{font-size:20px;font-weight:800;margin-bottom:4px}
.page-banner p{font-size:13px;opacity:.8;line-height:1.5}
.fault-list{padding:12px;display:flex;flex-direction:column;gap:7px}
.fault-card{background:#fff;border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid var(--green-border);min-height:56px}
.fault-card:active{transform:scale(.98)}
.fault-card-name{font-size:15px;font-weight:700;color:var(--text-dark)}
.fault-card-sub{font-size:12px;color:var(--text-light);margin-top:2px}
.fault-card-arrow{color:var(--green-mid);font-size:16px;flex-shrink:0}
.badge{display:inline-block;font-size:11px;font-weight:800;padding:4px 10px;border-radius:12px;background:var(--green-pale);color:var(--green-dark);letter-spacing:.3px}
.section{padding:14px 16px;border-bottom:1px solid var(--green-border);background:#fff}
.section-label{font-size:11px;font-weight:800;color:var(--text-light);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.key-question{font-size:15px;font-style:italic;line-height:1.5;color:var(--text-dark)}
.confirm-text{font-size:13.5px;line-height:1.6;color:var(--text-mid)}
.branch-card{background:var(--green-bg);border:1px solid var(--green-border);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.branch-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;gap:8px}
.branch-name{font-size:14px;font-weight:700;color:var(--green-dark)}
.branch-tag{font-size:10.5px;font-weight:700;color:var(--green-mid);white-space:nowrap}
.branch-row{font-size:12.5px;color:var(--text-mid);line-height:1.5;margin-bottom:3px}
.branch-row b{color:var(--text-dark);font-weight:700}
table.bf{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:4px}
table.bf th{background:var(--green-dark);color:#fff;padding:7px 10px;text-align:left;font-weight:700}
table.bf td{padding:6px 10px;border-bottom:1px solid var(--green-border)}
table.bf tr:nth-child(even) td{background:var(--green-bg)}
.tree-row{font-size:12.5px;line-height:2;color:var(--text-mid)}
.tree-row b{color:var(--text-dark);font-weight:700}
.chain-box{background:var(--green-pale);border-left:4px solid var(--green-mid);border-radius:0 8px 8px 0;padding:10px 13px;font-size:12.5px;line-height:1.9;color:var(--text-mid)}
.notes-box{background:#fff8e1;border-left:4px solid #f9a825;border-radius:0 8px 8px 0;padding:10px 13px;font-size:12.5px;line-height:1.6;color:var(--text-mid)}
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;padding:40px 28px;text-align:center;gap:10px;color:var(--text-light)}
</style>
</head>

const FAULTS = [

{id:'c-posture',name:'C posture',stage:'setup',
 classification:'Primary setup fault',
 keyQuestion:"Why can't the golfer set up with a neutral spine and rotate around it?",

 branches:[
  {name:'Poor hip hinge pattern',tag:'Most common',signs:'Bends through the spine instead of the hips, knees over-flexed, chest collapsed.',why:"They don't know how to hinge from the hips while maintaining a neutral spine.",screen:'Hip hinge dowel test, toe touch, bodyweight squat.',fix:'Hip hinge drill, wall hinge drill, dowel along the spine, mirror setup.',physical:'RDL pattern, goblet squat, hip hinge practice, good mornings.'},

 ],
 ballFlight:[['Pull fade','Limited rotation → OTT'],['Slice','Steep transition'],['Thin','Loss of posture'],['Heel strike','Arms move away from the body'],['Weak contact','Poor rotation'],['Short distance','Reduced speed and sequencing']],
 decisionTree:[['Hip hinge correct?','No → Hip hinge training'],['Thoracic extension adequate?','No → Improve T-spine'],['Pecs / lats tight?','Yes → Mobility program'],['Posterior chain strong?','No → Strength program'],['Scapular control?','Poor → Shoulder stability'],['Core endurance?','Poor → Core program'],['Lifestyle posture contributing?','Yes → Daily mobility & posture habits']],
 chain:'C-Posture → Limited Thoracic Extension → Flat Shoulder Plane → Poor Pelvic & Thoracic Separation → Over-the-Top → Steep Delivery → Early Extension or Chicken Wing → Weak Strike / Slice',

{id:'s-posture',name:'S posture',stage:'setup',
 classification:'Primary setup fault',
 keyQuestion:'Why is the golfer unable to find and maintain a neutral pelvis and spine?',
 confirm:'Excessive lower back arch, pelvis tipped forward (anterior pelvic tilt), belt buckle points down toward the ball, ribs flare upward, glutes appear stuck out, abdomen relaxed rather than braced, difficulty maintaining posture during practice swings. 3+ signs confirms.',
 branches:[
  {name:'Poor pelvic awareness',tag:'Most common',signs:'Unable to move between anterior and posterior pelvic tilt, always stands in excessive lordosis, cannot find neutral.',why:'The golfer simply lacks awareness of pelvic position.',screen:'Standing pelvic tilt test, quadruped pelvic tilt, wall posture assessment.',fix:'Neutral pelvis rehearsal, belt buckle slightly toward chin, "zip up your ribs", mirror setup practice.',physical:'Dead bugs, pelvic tilts, bird dogs, breathing drills.'},
  {name:'Tight hip flexors',tag:'Common',signs:'Pelvis pulled into anterior tilt, limited hip extension, lower back discomfort after golf.',why:'Short hip flexors maintain an anterior pelvic tilt.',screen:'Thomas test, half-kneeling hip extension, hip extension assessment.',fix:'Neutral setup after stretching, hip hinge from neutral.',physical:'Hip flexor stretch, couch stretch, glute bridge, split-stance hip extension.'},
  {name:'Weak glutes',signs:'Minimal glute activation, lower back dominates, difficulty maintaining posture.',why:'Weak glutes fail to stabilize the pelvis.',screen:'Single-leg bridge, glute bridge hold, single-leg squat.',fix:'Feel glutes supporting posture, hip hinge drill.',physical:'Glute bridges, hip thrusts, split squats, single-leg RDL.'},
  {name:'Poor core stability',signs:'Rib flare, excessive lumbar extension, poor trunk control.',why:'The abdominals cannot oppose lumbar extension.',screen:'Dead bug, side plank, front plank, Pallof press.',fix:'Brace before setup, rib cage over pelvis, breathing rehearsal.',physical:'Dead bugs, Pallof press, carries, side planks.'},
  {name:'Limited hamstring mobility',signs:'Difficulty hip hinging, compensatory lumbar extension, knees over-flexed.',why:'The golfer extends the spine to compensate for poor hip motion.',screen:'Toe touch, straight-leg raise, active hamstring test.',fix:'Hip hinge drill, soft knee setup, mirror work.',physical:'Hamstring mobility, RDL pattern, dynamic leg swings.'},
  {name:'Poor breathing pattern',signs:'Chest breathing, rib flare, difficulty maintaining abdominal pressure.',why:'Poor diaphragmatic control contributes to excessive lumbar extension.',screen:'90/90 breathing, crocodile breathing, rib expansion assessment.',fix:'Exhale into setup, stack ribs over pelvis, light abdominal brace.',physical:'90/90 breathing, balloon breathing, diaphragmatic breathing drills.'},
  {name:'Poor setup instruction',signs:'Excessive "stick your bum out", chest overextended, hyper-athletic posture.',why:'The golfer has been coached into an exaggerated setup.',screen:'None required.',fix:'Neutral athletic posture, hip hinge without lumbar extension, mirror and video feedback.',physical:'None required.'}
 ],
 ballFlight:[['Push','Early extension compensation'],['Hook','Loss of posture then flip'],['Thin','Standing up through impact'],['Heel strike','Pelvis moves toward the ball'],['Fat','Poor low-point control'],['Inconsistent strike','Dynamic posture breakdown']],
 decisionTree:[['Neutral pelvis available?','No → Pelvic awareness'],['Hip flexors tight?','Yes → Restore hip extension'],['Glutes strong?','No → Glute strengthening'],['Core stable?','No → Anti-extension program'],['Hamstrings mobile?','No → Improve hinge mobility'],['Breathing efficient?','No → Diaphragm training'],['Setup over-coached?','Yes → Rebuild address posture']],
 chain:'S-Posture → Poor Hip Hinge → Loss of Dynamic Posture → Early Extension → Club Stuck at P6 → Casting / Chicken Wing → Thin & Heel Contact',
 notes:'Extension-biased golfers (often S-Posture) tend toward early extension, hanging back, and getting the club stuck. Score setup on four checkpoints before diagnosing dynamic faults: pelvis, spine, hip hinge, rib-pelvis relationship.'},

{id:'grip',name:'Grip — weak and strong',stage:'setup',
 classification:'Foundational variable — not a primary or secondary fault by default',
 keyQuestion:"Is the grip compatible with the golfer's body motion and clubface delivery? Not: is it strong or weak?",
 confirm:'Weak: clubface consistently open at P6/P7, weak fades or slices, excessive lead wrist extension, difficulty squaring the face, high spin weak ball flight. Strong: clubface shuts early, hooks, pull hooks, excessive shaft lean, clubface closes rapidly.',
 branches:[
  {name:'[Weak] Poor clubface control',tag:'Most common',signs:'Face open halfway down, lead wrist extends, weak release.',why:'The grip limits the ability to square the face.',screen:'Clubface at P6, lead wrist position, grip check.',fix:'Strengthen grip slightly, motorcycle drill, punch shots, lead wrist flexion.',physical:'Usually none.'},
  {name:'[Weak] Poor forearm rotation',signs:'Little forearm rotation, passive release, chicken wing.',why:'Player lacks forearm mobility or awareness.',screen:'Pronation, supination, wrist mobility.',fix:'Grip-neutral rehearsal.',physical:'Rice bucket, hammer rotations, wrist mobility.'},
  {name:'[Weak] Open face from pivot',signs:'Chest stalls, face remains open, OTT develops.',why:"The grip isn't the problem — poor pivot leaves the face open.",screen:'Pivot and sequencing assessment.',fix:'Pressure shift, pivot drills, sequencing.',physical:'None required.'},
  {name:'[Weak] Incorrect grip education',signs:'Grip changes every lesson, never consistent.',why:'Player has no repeatable grip.',screen:'None required.',fix:'Grip routine, daily rehearsals.',physical:'None required.'},
  {name:'[Strong] Clubface too closed',tag:'Most common',signs:'Hooks, low left, pull hooks.',why:'Grip overwhelms body rotation.',screen:'Clubface at impact.',fix:'Neutralize grip, face awareness, hold-off drill.',physical:'None required.'},
  {name:'[Strong] Poor body rotation',signs:'Hands dominate, chest stalls, flip release.',why:"Strong grip isn't the issue — body stopped rotating.",screen:'Pelvic and thoracic rotation.',fix:'Rotation drills, step drill, medicine ball.',physical:'None required.'},
  {name:'[Strong] Excessive forearm roll',signs:'Rapid toe closure, hooks, timing inconsistent.',why:'Uncontrolled release timing.',screen:'Forearm rotation assessment.',fix:'Hold-off finish, split grip, lead wrist control.',physical:'None required.'},
  {name:'[Strong] Poor match-up',signs:'Very strong grip, very active release, little rotation.',why:'Bad match-up, not a bad grip.',screen:'Grip / pivot / release compatibility.',fix:'Rebuild the pattern, not the grip.',physical:'None required.'}
 ],
 ballFlight:[['Slice (weak)','Open face'],['Pull fade (weak)','OTT + open face'],['Weak fade (weak)','Poor release'],['High spin (weak)','Dynamic loft'],['Hook (strong)','Closed face'],['Pull hook (strong)','Closed face + OTT'],['Push hook (strong)','Inside path + closed face'],['Low bullets (strong)','Strong grip + shaft lean']],
 decisionTree:[['Weak — clubface open?','Yes → Grip / wrist'],['Weak — wrist mobility poor?','Yes → Mobility'],['Weak — pivot poor?','Yes → Pivot first'],['Weak — grip inconsistent?','Yes → Routine'],['Strong — face closed?','Yes → Neutralise grip'],['Strong — body rotate?','No → Improve pivot'],['Strong — forearm roll excessive?','Yes → Release drills'],['Strong — match-up poor?','Yes → Rebuild pattern']],
 chain:'Grip match-up assessment (not a compensation chain): 1. Is the clubface consistently delivered where the player intends? 2. Does the grip complement the pivot, wrist mechanics and release pattern? 3. Would changing the grip simplify the motion or create new compensations? If all three are positive, leave the grip alone.',
 notes:"Ben Hogan (weak grip) and Paul Azinger (strong grip) both played world-class golf because their body motion matched their grip. Grip/motion matrix: weak+good pivot=can work well; weak+poor pivot=face stays open; strong+great rotation=powerful and stable; strong+poor rotation=hooks and timing issues."},

{id:'sway',name:'Sway',stage:'backswing',

 keyQuestion:'Why did the golfer feel the need to move laterally in the backswing instead of rotating?',

  {name:'Limited trail hip internal rotation',signs:'Trail knee straightens, trail foot rolls, trail hip elevates.',why:"The trail hip locks — the pelvis has nowhere to rotate.",screen:'Trail hip IR: Excellent 40°, Good 30–40°, Poor 20–30°, Red <20°.',fix:'Feel trail hip behind the heel, maintain trail knee flex, chair drill.',physical:'Hip CARs, banded IR, 90/90 mobility, hip airplanes.'},
  {name:'Poor trail leg stability',signs:'Trail knee collapses, pressure outside trail foot, balance poor.',why:'Player cannot support rotational load.',screen:'Single-leg squat, single-leg balance, Y balance.',fix:'Feet together swings, trail leg loading, slow motion swings.',physical:'Split squats, single-leg RDL, lateral hops, step-downs.'},
  {name:'Limited thoracic rotation',signs:'Chest stops turning, pelvis slides, arms continue.',why:'Body borrows motion from sway.',screen:'Seated rotation, open books.',fix:'Cross-arm turns, shirt buttons behind ball, pause at P3.',physical:'Open books, windmills, thread the needle, med-ball rotations.'},
  {name:'Incorrect loading pattern',signs:'Player actively shifts, weight outside trail foot, reverse move later.',why:'Player thinks "load" means "move" (usually technical rather than physical).',screen:'Observation of loading pattern.',fix:'Pressure into inside trail heel, trail hip behind, pressure mat feedback.',physical:'Usually none required.'}
 ],
 ballFlight:[['Fat','Reverse shift'],['Thin',"Can't recenter"],['Push','Stuck behind'],['Hook','Slide then flip'],['Pull','Upper body recovery']],

 chain:'Poor Hip Mobility / Stability → Excessive Backswing Sway → Reverse Spine Angle → Poor Pressure Shift → Downswing Slide → Club Stuck at P6 → Early Extension → Flip Release → Poor Contact & Inconsistent Ball Flight'},

{id:'flat-shoulder-plane',name:'Flat shoulder plane',stage:'backswing',
 classification:'Primary technical fault',
 keyQuestion:"Why couldn't the lead shoulder work down and around?",
 confirm:'At P3-P4: lead shoulder stays level instead of moving down, trail shoulder does not move behind the player, shoulder turn appears almost horizontal, hands travel excessively around the body, club becomes very deep, head raises during backswing. 3+ signs confirms.',
 branches:[
  {name:'Poor address posture',tag:'Most common',signs:'Standing too upright, minimal hip hinge, rounded shoulders, chest already vertical.',why:'A vertical posture encourages a flat shoulder turn.',screen:'Hip hinge assessment, toe touch, overhead squat.',fix:'Athletic setup, chest over the balls of the feet, hip hinge rehearsals, mirror posture.',physical:'RDL pattern, hip hinge drill, goblet squat, hamstring mobility.'},
  {name:'Limited thoracic rotation',tag:'Common',signs:'Chest stops turning, arms continue around, trail shoulder does not get behind.',why:'Without thoracic rotation, the golfer rotates flatter around the spine.',screen:'Seated rotation, open books, thread the needle.',fix:'Cross-arm turns, shirt buttons behind the ball, pause at P2.',physical:'Open books, quadruped rotations, windmills, medicine-ball rotations.'},
  {name:'Poor side bend pattern',signs:'Little lead-side bend, head rises, shoulders remain level.',why:'The player rotates but never adds the appropriate amount of side bend.',screen:'Standing side bend, rib cage mobility, thoracic extension.',fix:'Lead shoulder to the ball, trail shoulder behind the head, wall shoulder drill.',physical:'Side bends, half-kneeling reaches, rib mobility, thoracic extension over a foam roller.'},
  {name:'Excessive arm depth',signs:'Hands behind the trail shoulder, club laid off or very deep, trail elbow disappears behind the body.',why:'The arms keep travelling around after the torso has finished rotating.',screen:'Mostly technical.',fix:'Early arm lift, hands in front of chest, split-hand drill, mirror work.',physical:'Usually minimal.'},
  {name:'Limited trail hip rotation',signs:'Trail hip stalls, pelvis stops turning, upper body compensates by flattening.',why:'The body seeks backswing length from the shoulders instead of the hips.',screen:'Trail hip internal rotation, pelvic rotation, hip airplanes.',fix:'Right glute behind, chair drill, belt buckle rotation.',physical:'Hip IR, 90/90 mobility, hip airplanes, split stance rotations.'},
  {name:'Poor scapular control',tag:'Stability root — mobility work will not fix this',signs:'Elevated shoulders, arms disconnect, trail shoulder shrugs.',why:'The shoulder girdle does not move efficiently around the rib cage — scapular stabilisers cannot hold the shoulder girdle in address position through the early takeaway, so the trail arm drifts independently of the thoracic spine.',screen:'Wall slides, shoulder flexion, scapular push-ups.',fix:'Wall slide drill, connection drill, slow rehearsals.',physical:'Face pulls, band pull-aparts, Y-T-W raises, serratus wall slides.'},
  {name:'Incorrect backswing intent',signs:'"Turn flat", "sweep it inside", club immediately behind the hands.',why:'The golfer has learned an incorrect movement pattern rather than having a physical limitation.',screen:'None required.',fix:'Lead shoulder down and across, club outside the hands to P2, mirror rehearsals, split-hand takeaway.',physical:'Usually no physical intervention required.'}
 ],
 ballFlight:[['Push','Deep delivery'],['Push-draw','Club trapped'],['Hook','Excessively inside path'],['Block','Hands stuck behind'],['Fat','Poor low point'],['Thin','Early extension compensation']],
 decisionTree:[['Address posture athletic?','No → Rebuild setup'],['Thoracic rotation adequate?','No → Improve T-spine'],['Side bend available?','No → Improve rib/thoracic mobility'],['Arms too deep?','Yes → Arm structure drills'],['Trail hip rotate?','No → Hip mobility'],['Scapular control?','Poor → Shoulder stability'],['Poor backswing concept?','Yes → Technical rebuild']],
 chain:'Poor Setup / Limited T-Spine → Flat Shoulder Plane → Flat Arm Plane → Deep Hands → Club Behind at P6 → Early Extension → Flip or Block',

{id:'flying-elbow',name:'Flying elbow',stage:'backswing',
 classification:'Conditional fault — not automatically a fault',
 keyQuestion:'Is the flying elbow creating compensations? (Not: is the elbow flying?)',
 confirm:'At P3-P4: trail elbow separates significantly from the rib cage, upper trail arm abducts well above shoulder level, hands become disconnected from the torso, club becomes very upright, shaft points across the line or laid off due to compensation. Only continue if it affects delivery.',
 branches:[
  {name:'Poor trail shoulder mobility',tag:'Most common physical cause',signs:'Trail shoulder elevates, difficulty externally rotating, elbow lifts to create room.',why:'The shoulder cannot rotate efficiently, so the elbow elevates.',screen:'Shoulder flexion, external rotation, Apley scratch test.',fix:'Trail elbow under, wall backswing drill, half swings.',physical:'Band external rotations, wall slides, face pulls, sleeper stretch where appropriate.'},

  {name:'Limited thoracic rotation',signs:'Chest stops turning, arms continue upward, elbow flies late.',why:'The golfer creates additional backswing length with the arms.',screen:'Seated thoracic rotation, open books, thread the needle.',fix:'Cross-arm turns, shirt buttons behind the ball, pause at P3.',physical:'Open books, windmills, quadruped rotations, thoracic extensions.'},
  {name:'Poor pelvic rotation',signs:'Hip turn limited, upper body dominates, arms overrun the body.',why:'The golfer seeks backswing length from the arms.',screen:'Pelvic rotation, hip IR, hip airplanes.',fix:'Chair drill, trail hip back, belt buckle turn.',physical:'Hip airplanes, 90/90 mobility, split-stance rotations.'},

  {name:'Grip too strong or too weak',signs:'Clubface across the line, wrist structure inconsistent, elbow compensates.',why:'Grip influences arm structure during the backswing.',screen:'None.',fix:'Grip assessment, wrist set rehearsal, split-hand takeaway.',physical:'None required.'},
  {name:'Intent to create more power',signs:'Long backswing, fast arm swing, tempo inconsistent.',why:'Player believes a longer backswing creates more speed.',screen:'Technical.',fix:'80% backswing, rhythm drills, count tempo, swing-to-finish drill.',physical:'None required.'}
 ],

  {name:'Club stuck behind at P6',signs:'Hands behind the trail thigh, trail elbow trapped, excessive inside delivery.',why:'The golfer hangs back to give the club time to catch up.',screen:'Trail shoulder ER, lead leg stability, thoracic rotation.',fix:'Wall drill, pump to P6, split-hand drill, baseball throw.',physical:'Medicine-ball throws, hip mobility, Pallof press.'},

  {name:'Limited lead hip internal rotation',signs:'Pelvis stops rotating, slide or early extension follows, weight remains back.',why:'The lead hip cannot clear, so the body avoids moving into it.',screen:'Lead Hip IR: Excellent >40°, Good 30–40°, Poor 20–30°, Red flag <20°.',fix:'Left pocket behind, chair drill, wall drill.',physical:'90/90 rotations, hip airplanes, banded IR, lateral lunges.'},
  {name:'Poor rotational sequencing',signs:'Arms start first, chest stalls, pelvis slides, tempo inconsistent.',why:'The golfer never transfers energy efficiently through the kinetic chain.',screen:'Medicine-ball throw, step-and-throw, rotational sequencing drill.',fix:'Pause at the top, three-pump drill, step drill, count tempo.',physical:'Medicine-ball scoop toss, cable rotations, Pallof press, anti-rotation work.'}
 ],

const state = {view:'list', stage:'setup', currentFaultId:null};

function renderStageNav(){
  const nav = document.getElementById('stage-nav');
  nav.innerHTML = STAGES.map(s =>
    '<button class="stage-tab'+(s.id===state.stage?' active':'')+'" onclick="switchStage(\''+s.id+'\')">'+s.label+'</button>'
  ).join('');
}

function switchStage(stageId){
  state.stage = stageId;
  state.view = 'list';
  renderStageNav();
  showList();
}

function showList(){
  document.getElementById('view-list').classList.add('active');
  document.getElementById('view-detail').classList.remove('active');
  document.getElementById('stage-nav').classList.remove('hidden');
  document.getElementById('main').classList.remove('no-stage');
  document.getElementById('back-btn').classList.remove('visible');
  document.getElementById('header-title').textContent = 'JDP Swing Sequence Map';

  const stage = STAGES.find(s => s.id === state.stage);
  document.getElementById('stage-title').textContent = stage.label;
  document.getElementById('stage-desc').textContent = stage.desc;

  const faults = FAULTS.filter(f => f.stage === state.stage);
  const container = document.getElementById('fault-list-container');

  if(!faults.length){
    container.innerHTML = '<div class="placeholder"><div style="font-size:15px;font-weight:700">No entries in this stage yet</div></div>';
    return;
  }

  container.innerHTML = faults.map(f =>
    '<div class="fault-card" onclick="openFault(\''+f.id+'\')">' +
      '<div style="flex:1">' +
        '<div class="fault-card-name">'+f.name+'</div>' +
        '<div class="fault-card-sub">'+f.classification+'</div>' +
      '</div>' +
      '<span class="fault-card-arrow">&#8250;</span>' +
    '</div>'
  ).join('');
}

function openFault(id){
  const f = FAULTS.find(x => x.id === id);
  if(!f) return;
  state.view = 'detail';
  state.currentFaultId = id;

  document.getElementById('view-list').classList.remove('active');
  document.getElementById('view-detail').classList.add('active');
  document.getElementById('stage-nav').classList.add('hidden');
  document.getElementById('main').classList.add('no-stage');
  document.getElementById('back-btn').classList.add('visible');
  document.getElementById('header-title').textContent = f.name;

  let html = '';

  html += '<div class="section">' +
    '<span class="badge">'+f.classification+'</span>' +
    '<div style="height:12px"></div>' +
    '<div class="section-label">Key question</div>' +
    '<div class="key-question">'+f.keyQuestion+'</div>' +
  '</div>';

  html += '<div class="section">' +
    '<div class="section-label">Confirm</div>' +
    '<div class="confirm-text">'+f.confirm+'</div>' +
  '</div>';

  html += '<div class="section"><div class="section-label">Branches</div>';
  f.branches.forEach((b,i) => {
    html += '<div class="branch-card">' +
      '<div class="branch-head"><span class="branch-name">'+(i+1)+'. '+b.name+'</span>' +
      (b.tag ? '<span class="branch-tag">'+b.tag+'</span>' : '') + '</div>' +
      '<div class="branch-row"><b>Signs</b> — '+b.signs+'</div>' +
      '<div class="branch-row"><b>Why</b> — '+b.why+'</div>' +
      '<div class="branch-row"><b>Screen</b> — '+b.screen+'</div>' +
      '<div class="branch-row"><b>Swing fixes</b> — '+b.fix+'</div>' +
      '<div class="branch-row"><b>Physical training</b> — '+b.physical+'</div>' +
    '</div>';
  });
  html += '</div>';

  html += '<div class="section"><div class="section-label">Ball flight clues</div>' +
    '<table class="bf"><tr><th>Ball flight</th><th>Likely cause</th></tr>' +
    f.ballFlight.map(r => '<tr><td>'+r[0]+'</td><td>'+r[1]+'</td></tr>').join('') +
    '</table></div>';

  html += '<div class="section"><div class="section-label">Decision tree</div>' +
    f.decisionTree.map(r => '<div class="tree-row">'+r[0]+' <b>'+r[1]+'</b></div>').join('') +
  '</div>';

  html += '<div class="section"><div class="section-label">Compensation chain</div>' +
    '<div class="chain-box">'+f.chain+'</div></div>';

  if(f.notes){
    html += '<div class="section"><div class="section-label">Coaching notes</div>' +
      '<div class="notes-box">'+f.notes+'</div></div>';
  }

  document.getElementById('view-detail').innerHTML = html;
  window.scrollTo(0,0);
}

function goBack(){
  showList();
}

renderStageNav();
showList();
</script>

</html>
